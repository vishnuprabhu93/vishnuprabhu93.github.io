<header>
  <nav class="wrap">
    <a href="{{ "/" | relURL }}" class="brand">
      <svg class="brand-mark" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="{{ .Site.Params.labName }} logo">
        <path d="M2,15 L8,15 L11,6 L14,24 L17,11 L19,19 L21,15 L28,15"/>
      </svg>
      <span class="brand-text">{{ .Site.Params.labName }}</span>
    </a>
    <button class="nav-toggle" type="button" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="navlinks">
      <span></span><span></span><span></span>
    </button>
    <div class="navlinks" id="navlinks">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL | relLangURL }}" class="{{ if $.IsMenuCurrent "main" . }}active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </div>
  </nav>
</header>

<script>
(function() {
  var toggle = document.querySelector('.nav-toggle');
  var nav = document.getElementById('navlinks');
  if (!toggle || !nav) return;
  toggle.addEventListener('click', function() {
    var isOpen = nav.classList.toggle('open');
    toggle.classList.toggle('open', isOpen);
    toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  });
  nav.querySelectorAll('a').forEach(function(link) {
    link.addEventListener('click', function() {
      nav.classList.remove('open');
      toggle.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
    });
  });
})();
</script>
