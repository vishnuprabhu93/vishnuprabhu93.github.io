{{ define "main" }}
<div class="wrap">
  <section class="block" style="padding-top:44px;">
    <h2 class="section-title" style="margin-bottom:12px;">Demos</h2>
    {{ if .Params.intro }}
    <p style="font-size:14px; color:var(--warm-gray); max-width:700px; margin-bottom:28px;">{{ .Params.intro }}</p>
    {{ end }}
    <div class="demo-grid">
      {{ range .Params.demos }}
      <div class="demo-item">
        <div class="demo-photo">
          {{ if .photo }}<img src="{{ .photo | relURL }}" alt="{{ .title }}">{{ else }}Photo{{ end }}
        </div>
        <div class="demo-title">{{ .title }}</div>
        {{ if .category }}<div class="demo-category">{{ .category }}</div>{{ end }}
        <div class="demo-desc">{{ .desc }}</div>
      </div>
      {{ end }}
    </div>
  </section>
</div>
{{ end }}
