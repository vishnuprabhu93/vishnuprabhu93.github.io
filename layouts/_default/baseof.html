<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.affiliation }}{{ end }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
</head>
<body>

{{ partial "header.html" . }}

<svg class="signal" viewBox="0 0 1080 28" preserveAspectRatio="none" aria-hidden="true">
  <path d="M0,14 L60,14 L70,4 L80,24 L90,14 L140,14 L150,8 L160,20 L170,14 L1080,14"/>
</svg>

<main>
{{ block "main" . }}{{ end }}
</main>

{{ partial "footer.html" . }}

</body>
</html>
